{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4" style="color: #efb911;">Duplicar Solicitud</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Crear Solicitud</button>
        <a href="{% url 'historial' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
